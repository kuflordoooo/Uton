<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>utoñ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#150E25;--cream:#F2E6CA;--muted:rgba(242,230,202,.62);--red:#C8492F;--ochre:#E0A12E;--mag:#E85CD0;--cyan:#5CE1E6;--gold:#F4C24B;--disp:"Bricolage Grotesque",system-ui,sans-serif;--ui:"Space Grotesk",system-ui,sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;background:#0c0818;color:var(--cream);font-family:var(--ui);}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #game{position:relative;width:100%;max-width:460px;height:100dvh;max-height:900px;overflow:hidden;background:var(--ink);touch-action:none;user-select:none;box-shadow:0 0 60px rgba(0,0,0,.6);}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #hud{position:absolute;inset:0;pointer-events:none;}
  .hud-lives{position:absolute;top:12px;left:14px;display:flex;gap:5px;align-items:center;}
  .hud-lives svg{display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
  .hud-center{position:absolute;top:9px;left:50%;transform:translateX(-50%);text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.6);}
  .hud-center .lvl{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--ochre);font-weight:500;}
  .hud-center .score{font-family:var(--disp);font-weight:800;font-size:30px;line-height:1;margin-top:2px;}
  .chip{position:absolute;top:12px;right:14px;pointer-events:auto;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--gold);background:rgba(244,194,75,.12);border:1px solid rgba(244,194,75,.5);padding:6px 11px;border-radius:999px;backdrop-filter:blur(4px);}
  .hpwrap{position:absolute;top:56px;left:50%;transform:translateX(-50%);width:140px;height:5px;background:rgba(0,0,0,.45);border-radius:99px;overflow:hidden;opacity:0;transition:opacity .3s;}
  .hpwrap.on{opacity:1;}
  .hpwrap > i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#F49ED8,var(--mag));border-radius:99px;transform-origin:left;transition:transform .12s linear;}
  .hpwrap.mini > i{background:linear-gradient(90deg,#8FD8FF,#2E7CC4);}
  .fab{position:absolute;bottom:62px;pointer-events:auto;display:none;align-items:center;gap:5px;font-family:var(--ui);font-weight:700;font-size:12.5px;padding:8px 11px;border-radius:999px;cursor:pointer;}
  .fab.show{display:inline-flex;}
  .fab svg{display:block;}
  #extraBtn{left:12px;background:rgba(200,73,47,.2);border:1.6px solid var(--red);color:#FFD6CC;animation:pls 1.1s ease-in-out infinite;}
  #bombBtn{left:50%;transform:translateX(-50%);background:rgba(244,194,75,.16);border:1.6px solid var(--gold);color:#FBE6B0;}
  #bombBtn.ready{animation:plsC 1.1s ease-in-out infinite;}
  #bombBtn.dim{opacity:.4;}
  #shieldBtn{right:12px;background:rgba(92,225,230,.16);border:1.6px solid var(--cyan);color:#CFFAFB;}
  #shieldBtn.ready{animation:pls 1.1s ease-in-out infinite;}
  #shieldBtn.dim{opacity:.4;}
  #shieldBtn.active{background:rgba(92,225,230,.32);}
  @keyframes pls{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes plsC{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.08)}}
  #alert{position:absolute;top:118px;left:50%;transform:translateX(-50%);pointer-events:none;opacity:0;transition:opacity .18s;font-family:var(--disp);font-weight:800;font-size:24px;color:#fff;text-shadow:0 0 18px rgba(232,92,208,.8);white-space:nowrap;}
  #alert.show{opacity:1;}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;gap:14px;background:radial-gradient(120% 90% at 50% 12%,rgba(20,12,38,.35),rgba(10,6,20,.82));}
  .overlay.hidden{display:none;}
  .wordmark{font-family:var(--disp);font-weight:800;font-size:clamp(58px,21vw,104px);line-height:.86;letter-spacing:-.02em;color:var(--cream);margin:0;text-shadow:0 0 26px rgba(232,92,208,.35),0 6px 0 rgba(0,0,0,.18);}
  .wordmark .n{color:var(--mag);}
  .tag{max-width:300px;font-size:15.5px;line-height:1.45;color:var(--muted);margin:0 0 4px;}
  .how{font-size:13px;color:var(--muted);margin-top:2px;}
  .row{display:flex;flex-direction:column;gap:11px;width:100%;max-width:280px;margin-top:6px;}
  .btn{font-family:var(--ui);font-weight:700;font-size:17px;padding:15px 22px;border-radius:15px;border:0;cursor:pointer;transition:transform .08s ease,filter .15s ease;}
  .btn:active{transform:scale(.97);}
  .btn:focus-visible{outline:3px solid var(--cyan);outline-offset:2px;}
  .btn-play{background:var(--cyan);color:#05262c;}
  .btn-gold{background:var(--gold);color:#3a2606;}
  .btn-wallet{background:transparent;color:var(--gold);border:1.6px solid var(--gold);}
  .btn-wallet.on{background:rgba(244,194,75,.14);}
  .btn[disabled]{opacity:.6;cursor:default;}
  .ohead{font-family:var(--disp);font-weight:800;font-size:clamp(40px,12vw,60px);margin:0;}
  .ostat{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--ochre);margin:-4px 0 0;}
  .ofinal{font-family:var(--disp);font-weight:800;font-size:clamp(46px,16vw,76px);line-height:.9;color:var(--gold);margin:2px 0 8px;}
  .ofinal small{display:block;font-family:var(--ui);font-weight:500;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
  #banner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .35s ease;}
  #banner.show{opacity:1;}
  #banner .bt{font-family:var(--disp);font-weight:800;font-size:clamp(34px,11vw,52px);color:var(--cream);text-shadow:0 0 24px rgba(232,92,208,.4);}
  #banner .bs{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--ochre);margin-top:4px;}
  #toast{position:absolute;left:50%;bottom:110px;transform:translate(-50%,14px);pointer-events:none;background:rgba(20,12,38,.92);border:1px solid rgba(242,230,202,.18);color:var(--cream);font-size:13.5px;padding:10px 16px;border-radius:12px;opacity:0;transition:opacity .25s,transform .25s;max-width:88%;text-align:center;}
  #toast.show{opacity:1;transform:translate(-50%,0);}
  #mute{position:absolute;bottom:14px;right:12px;pointer-events:auto;background:rgba(20,12,38,.6);border:1px solid rgba(242,230,202,.18);color:var(--muted);width:34px;height:34px;border-radius:10px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  #mute:focus-visible{outline:2px solid var(--cyan);}
</style>
</head>
<body>
<div id="game">
  <canvas id="c" aria-label="utoñ — shoot the masquerade and dodge its attacks"></canvas>
  <div id="hud">
    <div class="hud-lives" id="lives"></div>
    <div class="hud-center">
      <div class="lvl" id="lvlText">Level 1 · Lagos</div>
      <div class="score" id="scoreText">0</div>
    </div>
    <button class="chip" id="chip" type="button">
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 0L10 5L5 10L0 5Z" fill="currentColor"/></svg>
      <span id="chipText">utoñ · connect</span>
    </button>
    <div class="hpwrap" id="hpwrap"><i id="hpfill"></i></div>
  </div>
  <button id="extraBtn" class="fab" type="button" aria-label="Use extra life">
    <svg width="14" height="13" viewBox="0 0 14 14"><path d="M7 12.4C7 12.4 1 8.4 1 4.6 1 2.6 2.5 1.2 4.2 1.2 5.4 1.2 6.5 1.9 7 3 7.5 1.9 8.6 1.2 9.8 1.2 11.5 1.2 13 2.6 13 4.6 13 8.4 7 12.4 7 12.4Z" fill="#FF8A78"/></svg><span id="extraText">+1</span>
  </button>
  <button id="bombBtn" class="fab" type="button" aria-label="Use bomb">
    <svg width="15" height="15" viewBox="0 0 16 16"><circle cx="8" cy="9.5" r="5.6" fill="#F4C24B"/><rect x="7" y="1.5" width="2" height="4" fill="#E0A12E"/><circle cx="9.2" cy="2" r="1.6" fill="#E85CD0"/></svg><span id="bombText">Bomb</span>
  </button>
  <button id="shieldBtn" class="fab" type="button" aria-label="Activate shield">
    <svg width="13" height="14" viewBox="0 0 14 15"><path d="M7 0L13 2.5V7C13 11 10.5 13.5 7 15C3.5 13.5 1 11 1 7V2.5L7 0Z" fill="#5CE1E6"/></svg><span id="shieldText">Shield</span>
  </button>
  <div id="alert"></div>
  <div id="banner"><div class="bt" id="bTitle"></div><div class="bs" id="bSub"></div></div>
  <div id="toast"></div>
  <button id="mute" type="button" aria-label="Toggle sound">♪</button>

  <div class="overlay" id="start">
    <h1 class="wordmark">uto<span class="n">ñ</span></h1>
    <p class="tag">Face the masquerade across the world's cities, deserts and seas. Dodge its dive, defeat it for gems and power-ups, earn utoñ.</p>
    <div class="row">
      <button class="btn btn-play" id="playBtn" type="button">Play</button>
      <button class="btn btn-wallet" id="connectBtn1" type="button">Connect wallet</button>
    </div>
    <p class="how">Drag to move and dodge — your blaster fires on its own.</p>
  </div>

  <div class="overlay hidden" id="over">
    <h2 class="ohead">Defeated</h2>
    <p class="ostat" id="reachText">Reached Lagos · Level 1</p>
    <div class="ofinal"><small>Final score</small><span id="finalText">0</span></div>
    <div class="row">
      <button class="btn btn-gold hidden" id="submitBtn" type="button">Submit score</button>
      <button class="btn btn-wallet" id="connectBtn2" type="button">Connect wallet to submit</button>
      <button class="btn btn-play" id="againBtn" type="button">Play again</button>
    </div>
  </div>
</div>

<script>
/* =========================================================================
   utoñ — CONFIG  (scores go to your Google Form -> linked Sheet)
   ========================================================================= */
const CONFIG = {
  FORM_ACTION: "https://docs.google.com/forms/d/e/1FAIpQLSeIb3vf1A7OaNT2dow36QW7Dm0cAcSXoBE_qI_npss40Nquyg/formResponse",
  FORM_WALLET: "entry.246331344",
  FORM_SCORE:  "entry.192159058"
};

/* ===== Tunable dials ===== */
function bossHP(){ return 16 + (level-1)*6; }
const SHIELD_COST=500, SHIELD_TIME=5;
const BOMB_DMG=0.4, BOMB_EVERY=6, BOMB_CAP=3, BOMB_START=1;
const EXTRA_EVERY=5, EXTRA_CAP=3;
const POWERUP_TIME=8, GEM_VALUE=30, MINI_EVERY=4;
const DIVE_MIN=8, DIVE_MAX=13;          // seconds between dives
function enemySpeed(){ return Math.min(225, 115 + level*4.5); }
function bossSpeed(){ return Math.min(200, 62 + level*6); }   // a little faster at high levels

/* ---------- palette ---------- */
const CREAM="#F2E6CA",RED="#C8492F",DRED="#9B2F22",OCH="#E0A12E",MAG="#E85CD0",CYAN="#5CE1E6",GOLD="#F4C24B",SKIN="#E8B58A";

/* ---------- stages (cities + nature) ---------- */
const CITIES=[
 {name:"Lagos",        sky:["#2A1A4A","#7A2E63","#E06A3C"], sun:"#FFB24D", b1:"#1E1438", b2:"#2C1E4E", win:"#FFCB6E", ground:"#140C28", mark:"lagos"},
 {name:"London",       sky:["#28304E","#4A4E6B","#B5746A"], sun:"#E8B98C", b1:"#19203A", b2:"#232B49", win:"#FFE08A", ground:"#10142A", mark:"london"},
 {name:"Dubai",        sky:["#1A1640","#3A2A6B","#E0A23C"], sun:"#FFD27A", b1:"#160F33", b2:"#221848", win:"#7FE6FF", ground:"#120C2A", mark:"dubai"},
 {name:"New York",     sky:["#1C1B3A","#3E2C63","#C85B7C"], sun:"#F0A0B0", b1:"#161528", b2:"#221F40", win:"#FFE6A0", ground:"#100F22", mark:"newyork"},
 {name:"Doha",         sky:["#15203F","#2E4A6B","#E8B24A"], sun:"#FFD98A", b1:"#10182E", b2:"#1A2842", win:"#8FE8E0", ground:"#0C1426", mark:"doha"},
 {name:"Buenos Aires", sky:["#222B4A","#5A3A6B","#D98A6A"], sun:"#F0B488", b1:"#181E36", b2:"#242A48", win:"#FFD8A0", ground:"#10142A", mark:"buenos"},
 {name:"Dublin",       sky:["#223040","#3E5060","#A07A6A"], sun:"#D8C0A0", b1:"#18242A", b2:"#22343A", win:"#FFE0A0", ground:"#101820", mark:"dublin"},
 {name:"Paris",        sky:["#26243F","#4A3A60","#C77A6E"], sun:"#EFC0A0", b1:"#181626", b2:"#231F3A", win:"#FFE0A0", ground:"#100E1E", mark:"paris"},
 {name:"Tokyo",        sky:["#201A3A","#5A2A5E","#E0607A"], sun:"#F0A0B0", b1:"#15122A", b2:"#201A3E", win:"#7FD8FF", ground:"#0E0C20", mark:"tokyo"},
 {name:"Desert",       sky:["#2A2050","#8A4A5A","#E8A24A"], sun:"#FFD27A", b1:"#1A120C", b2:"#2E2018", win:"#FFCB6E", ground:"#160F0A", mark:"desert", nature:true},
 {name:"The River",    sky:["#1E2C44","#3A5060","#C88A5A"], sun:"#E8B88C", b1:"#14201C", b2:"#1E2C26", win:"#FFE0A0", ground:"#0E1814", mark:"river", nature:true, water:"#2C4A66"},
 {name:"Open Sea",     sky:["#162844","#2E5070","#E0A050"], sun:"#FFD27A", b1:"#10202E", b2:"#16303E", win:"#8FE8E0", ground:"#0A1A22", mark:"sea", nature:true, water:"#163A52"},
];

/* ---------- canvas ---------- */
const game=document.getElementById('game'),canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=0,H=0,dpr=1,horizon=0;
function resize(){
  dpr=Math.min(2,window.devicePixelRatio||1);W=canvas.clientWidth;H=canvas.clientHeight;
  canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);
  horizon=H*0.60;makeStars();
  player.y=H-92;boss.ty=Math.max(140,H*0.20);
  player.x=clamp(player.x||W/2,player.r,W-player.r);player.tx=clamp(player.tx||W/2,player.r,W-player.r);
  boss.x=clamp(boss.x||W/2,60,W-60);
}

/* ---------- state ---------- */
const player={x:0,y:0,tx:0,r:16,hitR:13,fireT:0,inv:1,tilt:0};
const boss={x:0,y:-60,ty:160,r:42,hitR:36,hp:16,maxhp:16,dir:1,mini:false,mode:'hover',modeT:0,diveCd:10,diveX:0};
let bullets=[],shots=[],parts=[],stars=[],pops=[],gems=[],powerups=[];
let buffs={rapid:0,spread:0,magnet:0};
let level=1,cityIndex=0,lives=3,score=0,survT=0,grace=0,shieldT=0,flash=0,shake=0;
let state='menu',submitted=false,last=0,wallet=null,lastLives=-1,lastShieldMode='',lastBombMode='';
let bombCharges=BOMB_START,extraCharges=0;
let attack={type:'aim',t:0,dur:4,fireT:0,angle:0};

/* ---------- helpers ---------- */
function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function rnd(a,b){return a+Math.random()*(b-a);}
function choice(a){return a[Math.floor(Math.random()*a.length)];}
function dist2(ax,ay,bx,by){const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;}
function fillCircle(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function fillCircleS(x,y,r,col){ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function srng(seed){return function(){seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};}

/* ---------- weapon sprites ---------- */
function spr(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
function makeOrb(size,glow,core,ring){
  const c=spr(size,size),g=c.getContext('2d'),r=size/2;
  const grad=g.createRadialGradient(r,r,0,r,r,r);grad.addColorStop(0,core);grad.addColorStop(0.3,glow);grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grad;g.beginPath();g.arc(r,r,r,0,Math.PI*2);g.fill();
  if(ring){g.strokeStyle=ring;g.lineWidth=2;g.beginPath();g.arc(r,r,size*0.27,0,Math.PI*2);g.stroke();}
  g.fillStyle='#ffffff';g.beginPath();g.arc(r,r,size*0.12,0,Math.PI*2);g.fill();
  return c;
}
function makeBolt(){
  const w=22,h=46,c=spr(w,h),g=c.getContext('2d'),cx=w/2;
  const lg=g.createLinearGradient(0,8,0,h);
  lg.addColorStop(0,'rgba(150,245,255,0.85)');lg.addColorStop(0.5,'rgba(92,225,230,0.32)');lg.addColorStop(1,'rgba(92,225,230,0)');
  g.fillStyle=lg;g.beginPath();g.moveTo(cx-4,8);g.lineTo(cx+4,8);g.lineTo(cx+1.5,h);g.lineTo(cx-1.5,h);g.closePath();g.fill();
  const rg=g.createRadialGradient(cx,10,0,cx,10,11);
  rg.addColorStop(0,'rgba(234,255,255,1)');rg.addColorStop(0.42,'rgba(120,240,255,0.8)');rg.addColorStop(1,'rgba(92,225,230,0)');
  g.fillStyle=rg;g.beginPath();g.arc(cx,10,11,0,Math.PI*2);g.fill();
  g.fillStyle='#ffffff';g.beginPath();g.arc(cx,10,3,0,Math.PI*2);g.fill();
  return c;
}
const sOrb=makeOrb(48,'rgba(232,92,208,0.95)','rgba(252,224,255,1)','rgba(255,205,250,0.9)');
const sOrbB=makeOrb(48,'rgba(92,180,255,0.95)','rgba(224,244,255,1)','rgba(180,230,255,0.9)');
const sFrag=makeOrb(30,'rgba(232,92,208,0.9)','rgba(252,224,255,1)',null);
const sBombGlow=makeOrb(76,'rgba(232,92,208,0.55)','rgba(232,92,208,0.22)',null);
const sBolt=makeBolt();

/* ---------- stars / particles / popups / drops ---------- */
function makeStars(){stars=[];const n=Math.round(W*H/9000);for(let i=0;i<n;i++)stars.push({x:rnd(0,W),y:rnd(0,horizon*0.85),r:rnd(0.5,1.6),p:rnd(0,6.28)});}
function burst(x,y,color,count,spd){for(let i=0;i<count;i++){const a=rnd(0,6.28),s=rnd(spd*0.3,spd);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.3,0.7),max:0.7,r:rnd(1.5,3.5),color});}}
function popup(x,y,text,color){pops.push({x,y,text,color:color||GOLD,life:1.1});}
function spawnGems(x,y,n){for(let i=0;i<n;i++)gems.push({x:x+rnd(-26,26),y:y+rnd(-16,16),vx:rnd(-70,70),vy:rnd(-50,30),life:9,p:rnd(0,6.28)});}
function spawnPowerup(x,y){powerups.push({x:clamp(x,30,W-30),y,vy:52,type:choice(['rapid','spread','magnet']),t:0});}
function activateBuff(type){
  buffs[type]=POWERUP_TIME;
  const lbl=type==='rapid'?'Rapid fire!':(type==='spread'?'Spread shot!':'Magnet!');
  const col=type==='rapid'?CYAN:(type==='spread'?GOLD:MAG);
  popup(player.x,player.y-30,lbl,col);toast(lbl);sndPower();
}

/* ---------- audio ---------- */
let actx=null,muted=false;
function resumeAudio(){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}}
function blip(f,d,t,v){if(muted||!actx)return;try{const o=actx.createOscillator(),g=actx.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.05;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+(d||0.09));o.stop(actx.currentTime+(d||0.1));}catch(e){}}
function sndHit(){blip(180,0.07,'square',0.03);}
function sndHurt(){blip(90,0.18,'sawtooth',0.07);}
function sndLevel(){blip(523,0.1,'triangle',0.06);setTimeout(()=>blip(784,0.14,'triangle',0.06),110);}
function sndOver(){blip(330,0.16,'sawtooth',0.06);setTimeout(()=>blip(196,0.3,'sawtooth',0.06),150);}
function sndCast(){blip(420,0.06,'sine',0.025);}
function sndBomb(){blip(70,0.28,'sawtooth',0.09);setTimeout(()=>blip(130,0.14,'square',0.06),60);}
function sndShield(){blip(660,0.12,'sine',0.05);setTimeout(()=>blip(990,0.16,'sine',0.05),90);}

/* =====================================================================
   FLOW
   ===================================================================== */
function setBoss(){
  boss.mini=(level%MINI_EVERY===0);
  boss.maxhp=bossHP()*(boss.mini?2:1);boss.hp=boss.maxhp;
  boss.x=W/2;boss.y=-60;boss.dir=1;
  boss.mode='hover';boss.modeT=0;boss.diveCd=rnd(DIVE_MIN,DIVE_MAX);boss.diveX=W/2;
}
function startGame(){
  level=1;cityIndex=0;lives=3;score=0;survT=0;submitted=false;shieldT=0;flash=0;shake=0;
  bullets=[];shots=[];parts=[];pops=[];gems=[];powerups=[];buffs={rapid:0,spread:0,magnet:0};
  bombCharges=BOMB_START;extraCharges=0;
  player.x=W/2;player.tx=W/2;player.y=H-92;player.inv=1.3;player.fireT=0;
  setBoss();grace=1.4;
  state='playing';start.classList.add('hidden');over.classList.add('hidden');
  pickAttack();banner(CITIES[0].name,'Level 1');updateExtraBtn();updateShieldBtn();updateBombBtn();resumeAudio();
}
function nextLevel(){
  const wasMini=boss.mini, bonus=(wasMini?400:200)*level;
  score+=bonus;popup(boss.x,Math.max(70,boss.y),'+'+bonus,GOLD);
  burst(boss.x,boss.y,wasMini?CYAN:MAG,28,340);burst(boss.x,boss.y,GOLD,16,260);sndLevel();shake=Math.max(shake,wasMini?12:7);
  spawnGems(boss.x,boss.y,wasMini?12:(4+Math.floor(rnd(0,3))));
  if(wasMini||Math.random()<0.6)spawnPowerup(boss.x,boss.y-10);
  level++;cityIndex=(level-1)%CITIES.length;
  setBoss();shots=[];bullets=[];grace=1.5;pickAttack();
  if(level%EXTRA_EVERY===0&&extraCharges<EXTRA_CAP){extraCharges++;popup(player.x,player.y-50,'+1 LIFE READY','#FF8A78');toast('Extra life earned — tap +1 when you need it.');}
  if(level%BOMB_EVERY===0&&bombCharges<BOMB_CAP){bombCharges++;toast('Bomb earned!');}
  updateExtraBtn();updateBombBtn();
  banner(CITIES[cityIndex].name, boss.mini?('Mini-boss · Level '+level):('Level '+level));
  if(boss.mini)showAlert('Mini-boss ahead!');
}
function gameOver(){
  state='over';reachText.textContent='Reached '+CITIES[cityIndex].name+' · Level '+level;
  finalText.textContent=score.toLocaleString();over.classList.remove('hidden');
  updateWalletUI();updateExtraBtn();updateShieldBtn();updateBombBtn();sndOver();
}
function useExtraLife(){
  if(extraCharges<=0||state!=='playing')return;
  extraCharges--;lives++;lastLives=-1;
  updateExtraBtn();updateHUD();burst(player.x,player.y,'#7CF08A',16,240);popup(player.x,player.y-30,'+1 LIFE','#7CF08A');toast('+1 life');sndLevel();
}
function updateExtraBtn(){
  const show=state==='playing'&&extraCharges>0;
  extraText.textContent='+1'+(extraCharges>1?(' ×'+extraCharges):'');
  if(show)extraBtn.classList.add('show');else extraBtn.classList.remove('show');
}
function activateShield(){
  if(state!=='playing'||shieldT>0)return;
  if(score<SHIELD_COST){toast('Need '+SHIELD_COST+' points for a shield.');return;}
  score-=SHIELD_COST;shieldT=SHIELD_TIME;player.inv=Math.max(player.inv,0.1);
  burst(player.x,player.y,CYAN,18,240);toast('Shield up — '+SHIELD_TIME+' seconds!');sndShield();updateShieldBtn();
}
function updateShieldBtn(){
  let mode=state!=='playing'?'hide':(shieldT>0?'active':(score>=SHIELD_COST?'ready':'dim'));
  if(mode==='active')shieldText.textContent='Shield '+Math.ceil(shieldT)+'s';
  if(mode===lastShieldMode)return;lastShieldMode=mode;
  shieldBtn.classList.remove('show','ready','dim','active');
  if(mode==='hide')return;shieldBtn.classList.add('show');
  if(mode==='active')shieldBtn.classList.add('active');
  else if(mode==='ready'){shieldBtn.classList.add('ready');shieldText.textContent='Shield';}
  else{shieldBtn.classList.add('dim');shieldText.textContent='Shield '+SHIELD_COST;}
}
function usePlayerBomb(){
  if(state!=='playing')return;
  if(bombCharges<=0){toast('No bombs left — you earn one every '+BOMB_EVERY+' levels.');return;}
  bombCharges--;
  for(const s of shots)burst(s.x,s.y,MAG,2,120);
  shots=[];
  flash=0.9;shake=14;burst(player.x,player.y-40,CYAN,30,420);burst(W/2,H*0.4,GOLD,22,360);
  popup(W/2,H*0.42,'BOMB!',CYAN);toast('Bomb!');sndBomb();
  if(boss.y>0){boss.hp-=Math.ceil(boss.maxhp*BOMB_DMG);if(boss.hp<=0){nextLevel();}}
  updateBombBtn();
}
function updateBombBtn(){
  bombText.textContent=bombCharges>0?('Bomb ×'+bombCharges):'Bomb';
  let mode=state!=='playing'?'hide':(bombCharges>0?'ready':'dim');
  if(mode===lastBombMode)return;lastBombMode=mode;
  bombBtn.classList.remove('show','ready','dim');
  if(mode==='hide')return;bombBtn.classList.add('show');
  if(mode==='ready')bombBtn.classList.add('ready');else bombBtn.classList.add('dim');
}

/* ---------- masquerade weapon system ---------- */
function pickAttack(){
  if(boss.mini){
    attack.type=Math.random()<0.6?'ring':'aim';
    attack.dur=rnd(3.0,4.5);attack.t=0;attack.fireT=0;
    if(attack.type==='ring')showAlert('Ring burst!');
    return;
  }
  const pool=['aim','spread'];
  if(level>=3)pool.push('bomb');
  if(level>=5)pool.push('rain');
  if(level>=7)pool.push('spiral');
  let t=choice(pool);if(t===attack.type&&pool.length>1)t=choice(pool);
  attack.type=t;attack.dur=rnd(3.8,5.8);attack.t=0;attack.fireT=0;
  if(t==='bomb')showAlert('Bombs!');else if(t==='rain')showAlert('Spirit rain!');else if(t==='spiral')showAlert('Spiral!');
}
function mkOrb(x,y,vx,vy){return {kind:'orb',x,y,vx,vy,r:11,t:0};}
function fireAttack(){
  if(shots.length>85){attack.fireT=0.3;return;}
  const sp=enemySpeed(),t=attack.type;
  if(t==='aim'){
    const a=Math.atan2(player.y-boss.y,player.x-boss.x);
    shots.push(mkOrb(boss.x,boss.y+20,Math.cos(a)*sp,Math.max(70,Math.sin(a)*sp)));
    attack.fireT=Math.max(0.7,1.15-level*0.012);sndCast();
  }else if(t==='spread'){
    const n=Math.min(5,3+Math.floor(level/4));
    for(let i=0;i<n;i++){const a=Math.PI/2+(i-(n-1)/2)*(0.95/Math.max(1,n-1));shots.push(mkOrb(boss.x,boss.y+20,Math.cos(a)*sp,Math.max(60,Math.sin(a)*sp)));}
    attack.fireT=Math.max(1.0,1.5-level*0.018);sndCast();
  }else if(t==='bomb'){
    shots.push({kind:'bomb',x:rnd(70,W-70),y:boss.y+10,vx:0,vy:58,r:15,fuse:rnd(1.5,2.2),t:0});
    attack.fireT=Math.max(1.6,2.3-level*0.03);sndCast();
  }else if(t==='rain'){
    const c=Math.min(4,2+Math.floor(level/5));for(let i=0;i<c;i++)shots.push(mkOrb(rnd(20,W-20),70,0,sp*0.9));
    attack.fireT=Math.max(0.5,0.75-level*0.008);
  }else if(t==='spiral'){
    attack.angle+=0.4;for(const off of [0,Math.PI]){const a=attack.angle+off;shots.push(mkOrb(boss.x,boss.y,Math.cos(a)*sp*0.75,Math.abs(Math.sin(a))*sp*0.55+85));}
    attack.fireT=0.18;
  }else if(t==='ring'){
    const n=14,rs=sp*0.8;for(let i=0;i<n;i++){const a=i/n*Math.PI*2+attack.angle;shots.push(mkOrb(boss.x,boss.y,Math.cos(a)*rs,Math.sin(a)*rs));}
    attack.angle+=0.22;attack.fireT=2.2;sndCast();shake=Math.max(shake,5);
  }
}
function burstBomb(s){
  const n=9+Math.floor(level/2),sp=Math.min(250,130+level*6);
  for(let k=0;k<n;k++){const a=k/n*Math.PI*2;shots.push({kind:'frag',x:s.x,y:s.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp*0.7+50,r:8,t:0});}
  burst(s.x,s.y,MAG,18,260);burst(s.x,s.y,GOLD,8,200);sndBomb();shake=Math.max(shake,6);
}
function hitPlayer(){
  lives--;player.inv=1.5;shake=Math.max(shake,7);
  burst(player.x,player.y,CREAM,12,240);burst(player.x,player.y,RED,8,200);sndHurt();
  if(lives<=0)gameOver();
}

/* =====================================================================
   UPDATE
   ===================================================================== */
function update(dt){
  if(grace>0)grace-=dt;
  if(shieldT>0)shieldT-=dt;
  if(shake>0)shake=Math.max(0,shake-dt*42);
  if(flash>0)flash=Math.max(0,flash-dt*3);
  for(const k in buffs)if(buffs[k]>0)buffs[k]=Math.max(0,buffs[k]-dt);
  survT+=dt;while(survT>=1){score+=2;survT-=1;}

  // player + evolving blaster (+ buffs)
  player.x+=(player.tx-player.x)*Math.min(1,dt*14);
  player.tilt=clamp((player.tx-player.x)*0.05,-0.32,0.32);
  if(player.inv>0)player.inv-=dt;
  player.fireT-=dt;
  if(player.fireT<=0){
    const tier=level<3?1:(level<5?2:3);
    let rate=level<3?0.18:(level<5?0.16:(level<8?0.15:0.12));
    if(buffs.rapid>0)rate*=0.5;
    let offs=buffs.spread>0?[0,-26,26,-52,52]:(tier===1?[0]:(tier===2?[-22,22]:[0,-34,34]));
    for(const vx of offs)bullets.push({x:player.x,y:player.y-20,vx:vx,vy:-560,r:5});
    player.fireT=rate;
  }

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.y<-24||b.x<-24||b.x>W+24){bullets.splice(i,1);continue;}
    if(boss.y>0&&dist2(b.x,b.y,boss.x,boss.y)<(boss.hitR+b.r)*(boss.hitR+b.r)){
      bullets.splice(i,1);boss.hp--;score+=5;sndHit();burst(b.x,boss.y+boss.r*0.4,i%2?CREAM:MAG,3,150);
      if(boss.hp<=0){nextLevel();break;}
    }
  }

  // boss state machine: hover -> telegraph -> dive -> return
  if(boss.y>-100){
    if(boss.mode==='hover'){
      boss.y+=(boss.ty-boss.y)*Math.min(1,dt*4);
      if(boss.y>0){
        boss.x+=boss.dir*bossSpeed()*dt;
        if(boss.x<60){boss.x=60;boss.dir=1;} if(boss.x>W-60){boss.x=W-60;boss.dir=-1;}
        if(grace<=0){
          attack.t+=dt;attack.fireT-=dt;if(attack.fireT<=0)fireAttack();if(attack.t>=attack.dur)pickAttack();
          boss.diveCd-=dt;
          if(boss.diveCd<=0){boss.mode='telegraph';boss.modeT=0.75;boss.diveX=clamp(player.x,40,W-40);showAlert('It dives!');shake=Math.max(shake,4);sndDive();}
        }
      }
    }else if(boss.mode==='telegraph'){
      boss.modeT-=dt;if(boss.modeT<=0)boss.mode='dive';
    }else if(boss.mode==='dive'){
      boss.x+=(boss.diveX-boss.x)*Math.min(1,dt*5);
      boss.y+=640*dt;
      const rr=boss.hitR+player.hitR;
      if(player.inv<=0&&shieldT<=0&&dist2(boss.x,boss.y,player.x,player.y)<rr*rr){hitPlayer();shake=Math.max(shake,12);boss.mode='return';}
      if(boss.y>=player.y-6)boss.mode='return';
    }else{ // return
      boss.y+=(boss.ty-boss.y)*Math.min(1,dt*3.5);
      if(boss.y<=boss.ty+6){boss.y=boss.ty;boss.mode='hover';boss.diveCd=rnd(DIVE_MIN,DIVE_MAX);}
    }
  }

  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i];
    if(s.kind==='bomb'){s.vy+=18*dt;s.y+=s.vy*dt;s.fuse-=dt;s.t+=dt;if(s.fuse<=0||s.y>H-120){burstBomb(s);shots.splice(i,1);continue;}}
    else{s.x+=s.vx*dt;s.y+=s.vy*dt;s.t+=dt;if(s.y>H+24||s.x<-24||s.x>W+24){shots.splice(i,1);continue;}}
    if(player.inv<=0&&shieldT<=0&&dist2(s.x,s.y,player.x,player.y)<(player.hitR+s.r)*(player.hitR+s.r)){
      if(s.kind==='bomb')burstBomb(s);
      shots.splice(i,1);hitPlayer();if(lives<=0)return;
    }
  }

  // gems
  for(let i=gems.length-1;i>=0;i--){
    const g=gems[i];
    if(buffs.magnet>0){const dx=player.x-g.x,dy=player.y-g.y,d=Math.hypot(dx,dy)||1;g.vx+=dx/d*1100*dt;g.vy+=dy/d*1100*dt;g.vx*=0.88;g.vy*=0.88;}
    else{g.vy+=230*dt;g.vx*=0.985;}
    g.x+=g.vx*dt;g.y+=g.vy*dt;g.life-=dt;g.p+=dt*6;
    if(dist2(g.x,g.y,player.x,player.y)<(player.r+15)*(player.r+15)){score+=GEM_VALUE;burst(g.x,g.y,GOLD,3,140);sndGem();gems.splice(i,1);continue;}
    if(g.y>H+30||g.life<=0)gems.splice(i,1);
  }
  // powerups
  for(let i=powerups.length-1;i>=0;i--){
    const pu=powerups[i];pu.y+=pu.vy*dt;pu.t+=dt;
    if(dist2(pu.x,pu.y,player.x,player.y)<(player.r+18)*(player.r+18)){activateBuff(pu.type);burst(pu.x,pu.y,GOLD,10,200);powerups.splice(i,1);continue;}
    if(pu.y>H+30)powerups.splice(i,1);
  }

  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1);}
  for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.y-=34*dt;p.life-=dt;if(p.life<=0)pops.splice(i,1);}
}

/* =====================================================================
   RENDER
   ===================================================================== */
function palm(x,baseY,s,col){
  ctx.strokeStyle=col;ctx.lineWidth=4*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,baseY);ctx.quadraticCurveTo(x-7*s,baseY-22*s,x-3*s,baseY-36*s);ctx.stroke();
  const tx=x-3*s,ty=baseY-36*s;ctx.lineWidth=3*s;
  for(let a=0;a<7;a++){const ang=-Math.PI+(a/6)*Math.PI;ctx.beginPath();ctx.moveTo(tx,ty);ctx.quadraticCurveTo(tx+Math.cos(ang)*16*s,ty+Math.sin(ang)*16*s-6*s,tx+Math.cos(ang)*28*s,ty+Math.sin(ang)*10*s);ctx.stroke();}
  ctx.lineCap='butt';
}
function eiffel(x,Y,h,w,col){
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(x-w,Y);ctx.quadraticCurveTo(x-w*0.28,Y-h*0.55,x-w*0.08,Y-h);ctx.lineTo(x+w*0.08,Y-h);ctx.quadraticCurveTo(x+w*0.28,Y-h*0.55,x+w,Y);ctx.closePath();ctx.fill();
  ctx.fillRect(x-w*0.5,Y-h*0.4,w,4);
  ctx.fillRect(x-w*0.26,Y-h*0.68,w*0.52,3);
  ctx.fillRect(x-1.5,Y-h-10,3,10);
}
function drawBackground(c,t){
  const s=c.sky;
  let g=ctx.createLinearGradient(0,0,0,horizon*0.55);g.addColorStop(0,s[0]);g.addColorStop(1,s[1]);ctx.fillStyle=g;ctx.fillRect(0,0,W,horizon*0.55+1);
  g=ctx.createLinearGradient(0,horizon*0.55,0,horizon);g.addColorStop(0,s[1]);g.addColorStop(1,s[2]);ctx.fillStyle=g;ctx.fillRect(0,horizon*0.55,W,horizon-horizon*0.55+1);
  for(const st of stars){ctx.globalAlpha=0.4+0.5*Math.abs(Math.sin(t*1.5+st.p));ctx.fillStyle=CREAM;fillCircle(st.x,st.y,st.r);}
  ctx.globalAlpha=1;
  ctx.fillStyle=c.sun;fillCircle(W*0.56,horizon-6,66);
  ctx.fillStyle=s[2];for(let k=0;k<3;k++)ctx.fillRect(W*0.56-66,horizon-30+k*16,132,4);
  if(c.nature){
    drawLandmark(c); // nature scenes draw their own scenery + foreground
  }else{
    drawSkyline(c);drawLandmark(c);
    ctx.fillStyle=c.ground;ctx.fillRect(0,horizon,W,H-horizon);
    ctx.strokeStyle='rgba(255,255,255,.045)';ctx.lineWidth=1;
    for(let gy=horizon+34;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
    ctx.beginPath();ctx.moveTo(W/2,horizon);ctx.lineTo(-W*0.4,H);ctx.moveTo(W/2,horizon);ctx.lineTo(W*1.4,H);ctx.stroke();
  }
}
function wins(x,w,top,c){ctx.fillStyle=c.win;for(let wy=top+8;wy<horizon-6;wy+=13)for(let wx=x+5;wx<x+w-4;wx+=11)if(Math.sin(wx*12.9+wy*7.7)>0.5)ctx.fillRect(wx,wy,3,4);}
function drawSkyline(c){
  const rng=srng(100+cityIndex*9);let bx=0;
  while(bx<W){const bw=20+rng()*22,bh=30+rng()*Math.max(40,H*0.16),top=horizon-bh;ctx.fillStyle=(bw>32?c.b2:c.b1);ctx.fillRect(bx,top,bw,bh+1);wins(bx,bw,top,c);bx+=bw+12+rng()*26;}
}
function drawLandmark(c){
  const Y=horizon,B=c.b1,B2=c.b2;
  if(c.mark==='lagos'){
    const px=W*0.5,ph=H*0.30,deck=Y-14;
    ctx.fillStyle=B2;ctx.fillRect(0,deck,W,5);
    ctx.fillStyle=B;ctx.beginPath();ctx.moveTo(px-7,deck);ctx.lineTo(px-3,deck-ph);ctx.lineTo(px+3,deck-ph);ctx.lineTo(px+7,deck);ctx.closePath();ctx.fill();
    ctx.strokeStyle=B2;ctx.lineWidth=1.4;for(let i=1;i<=5;i++){ctx.beginPath();ctx.moveTo(px,deck-ph+4);ctx.lineTo(px-i*22,deck);ctx.moveTo(px,deck-ph+4);ctx.lineTo(px+i*22,deck);ctx.stroke();}
    ctx.fillStyle=B;for(const hx of [W*0.12,W*0.2,W*0.82]){ctx.fillRect(hx-3,Y-22,2,22);ctx.fillRect(hx+9,Y-22,2,22);ctx.fillRect(hx-6,Y-30,20,9);}
  }else if(c.mark==='london'){
    [[W*0.08,46,66],[W*0.2,38,52],[W*0.6,42,60]].forEach(b=>{const top=Y-b[2];ctx.fillStyle=B2;ctx.fillRect(b[0],top,b[1],b[2]+1);wins(b[0],b[1],top,c);});
    ctx.fillStyle=B;ctx.beginPath();ctx.ellipse(W*0.72,Y-46,16,52,0,Math.PI,0);ctx.lineTo(W*0.72+12,Y);ctx.lineTo(W*0.72-12,Y);ctx.closePath();ctx.fill();
    const cx=W*0.4,tw=24,th=158,top=Y-th;ctx.fillStyle=B;ctx.fillRect(cx,top,tw,th+1);ctx.fillStyle=c.win;ctx.fillRect(cx+6,top+20,tw-12,tw-12);
    ctx.fillStyle=B;ctx.beginPath();ctx.moveTo(cx-3,top);ctx.lineTo(cx+tw/2,top-20);ctx.lineTo(cx+tw+3,top);ctx.closePath();ctx.fill();
    const wx=W*0.86,wy=Y-48,r=30;ctx.strokeStyle=B2;ctx.lineWidth=3;ctx.beginPath();ctx.arc(wx,wy,r,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=1.3;for(let a=0;a<8;a++){ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+Math.cos(a*0.785)*r,wy+Math.sin(a*0.785)*r);ctx.stroke();}
  }else if(c.mark==='dubai'){
    [[W*0.06,38,60],[W*0.18,32,86],[W*0.66,40,70]].forEach(b=>{const top=Y-b[2];ctx.fillStyle=B2;ctx.fillRect(b[0],top,b[1],b[2]+1);wins(b[0],b[1],top,c);});
    const cx=W*0.4,h=H*0.42,bw=46,top=Y-h;ctx.fillStyle=B;ctx.beginPath();ctx.moveTo(cx,Y);ctx.lineTo(cx+bw,Y);ctx.lineTo(cx+bw*0.6,top);ctx.lineTo(cx+bw*0.4,top);ctx.closePath();ctx.fill();
    ctx.fillRect(cx+bw*0.46,top-34,3,34);ctx.fillStyle=c.win;for(let wy=top+18;wy<Y-8;wy+=15)ctx.fillRect(cx+bw*0.42,wy,6,4);
    ctx.fillStyle=B;ctx.beginPath();ctx.moveTo(W*0.74,Y);ctx.quadraticCurveTo(W*0.74,Y-96,W*0.83,Y-96);ctx.quadraticCurveTo(W*0.79,Y-40,W*0.82,Y);ctx.closePath();ctx.fill();
  }else if(c.mark==='newyork'){

function drawMasquerade(cx,cy,t,mini){
  const A=mini?{acc:'#2E7CC4',body:'#1E3A6B',str:'#3A8FD0',eye:CYAN,glow:CYAN,top:'#7FD8FF'}:{acc:RED,body:DRED,str:OCH,eye:GOLD,glow:MAG,top:OCH};
  ctx.save();ctx.translate(cx,cy+Math.sin(t*2)*3);
  ctx.globalAlpha=0.16+Math.abs(Math.sin(t*3))*0.06;ctx.fillStyle=A.glow;ctx.beginPath();ctx.ellipse(0,0,56,72,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  const cc=[A.acc,CREAM,A.top,CREAM,A.acc],ch=mini?44:34;
  for(let k=-2;k<=2;k++){const x=k*15,hgt=ch-Math.abs(k)*5;ctx.fillStyle=cc[k+2];ctx.beginPath();ctx.moveTo(x-9,-40);ctx.lineTo(x+9,-40);ctx.lineTo(x,-40-hgt);ctx.closePath();ctx.fill();}
  ctx.fillStyle=A.body;ctx.beginPath();ctx.moveTo(-30,28);ctx.lineTo(30,28);ctx.lineTo(42,88);ctx.lineTo(-42,88);ctx.closePath();ctx.fill();
  for(let s=-6;s<=6;s++){ctx.strokeStyle=s%2?A.str:A.acc;ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(s*4.4,30);ctx.lineTo(s*6.6,88);ctx.stroke();}
  ctx.fillStyle=A.str;ctx.beginPath();ctx.ellipse(-34,30,12,9,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(34,30,12,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=A.acc;ctx.fillRect(-30,27,60,12);
  ctx.fillStyle=CREAM;for(let z=-30;z<28;z+=10){ctx.beginPath();ctx.moveTo(z,39);ctx.lineTo(z+5,27);ctx.lineTo(z+10,39);ctx.closePath();ctx.fill();}
  ctx.fillStyle=CREAM;ctx.beginPath();ctx.ellipse(0,-4,30,40,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=A.acc;ctx.fillRect(-28,-30,56,12);
  ctx.fillStyle=CREAM;for(let z=-28;z<26;z+=9){ctx.beginPath();ctx.moveTo(z,-18);ctx.lineTo(z+4.5,-30);ctx.lineTo(z+9,-18);ctx.closePath();ctx.fill();}
  const eg=0.5+Math.abs(Math.sin(t*4))*0.5;
  for(const ex of [-13,13]){
    ctx.globalAlpha=0.4*eg;ctx.fillStyle=A.glow;fillCircle(ex,-8,11);ctx.globalAlpha=1;
    ctx.fillStyle="#241018";ctx.beginPath();ctx.moveTo(ex-9,-12);ctx.lineTo(ex+9,-8);ctx.lineTo(ex-7,-2);ctx.closePath();ctx.fill();
    ctx.fillStyle=A.eye;ctx.beginPath();ctx.moveTo(ex-6,-10);ctx.lineTo(ex+5,-8);ctx.lineTo(ex-5,-5);ctx.closePath();ctx.fill();
    ctx.fillStyle="#fff";fillCircle(ex-2,-8,1.4);
  }
  ctx.fillStyle="#3A2A1A";ctx.fillRect(-2,-4,4,18);
  ctx.fillStyle="#241018";ctx.fillRect(-15,18,30,10);
  ctx.fillStyle=CREAM;for(let m=-15;m<15;m+=5)ctx.fillRect(m+1,18,3,10);
  ctx.restore();
}
function drawHero(cx,cy,t){
  const blink=player.inv>0&&shieldT<=0&&Math.floor(t*12)%2===0;
  ctx.save();ctx.translate(cx,cy);ctx.globalAlpha=blink?0.4:1;
  ctx.fillStyle="rgba(0,0,0,.3)";ctx.beginPath();ctx.ellipse(0,30,18,5,0,0,Math.PI*2);ctx.fill();
  ctx.rotate(player.tilt*0.6);
  ctx.fillStyle="#123F3A";ctx.fillRect(-7,14,6,16);ctx.fillRect(2,14,6,16);
  ctx.fillStyle="#0d2c29";ctx.fillRect(-9,29,9,4);ctx.fillRect(1,29,9,4);
  ctx.fillStyle="#18837C";rrect(-11,-6,22,22,5);ctx.fill();
  ctx.fillStyle="#1FA89E";ctx.fillRect(-11,-2,22,4);
  ctx.strokeStyle="#18837C";ctx.lineWidth=5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(7,-2);ctx.lineTo(13,-14);ctx.stroke();
  ctx.fillStyle="#2A2A33";ctx.save();ctx.translate(13,-14);ctx.rotate(-0.5);ctx.fillRect(-3,-15,7,16);ctx.restore();
  fillCircleS(15,-24,3.5,CYAN);fillCircleS(15,-24,1.8,'#EAFFFF');
  ctx.fillStyle=SKIN;fillCircle(0,-16,11);
  ctx.fillStyle=OCH;ctx.beginPath();ctx.arc(0,-16,11,Math.PI*1.05,Math.PI*1.95,false);ctx.lineTo(0,-16);ctx.fill();
  ctx.fillStyle=OCH;ctx.fillRect(-11,-18,22,4);
  ctx.restore();
}
function drawGem(g){
  ctx.globalAlpha=0.35;fillCircleS(g.x,g.y,9,GOLD);ctx.globalAlpha=1;
  const w=5+Math.abs(Math.sin(g.p))*1.5;
  ctx.fillStyle=GOLD;ctx.beginPath();ctx.moveTo(g.x,g.y-7);ctx.lineTo(g.x+w,g.y);ctx.lineTo(g.x,g.y+7);ctx.lineTo(g.x-w,g.y);ctx.closePath();ctx.fill();
  ctx.fillStyle='#FFF3D0';ctx.beginPath();ctx.moveTo(g.x,g.y-3);ctx.lineTo(g.x+2,g.y);ctx.lineTo(g.x,g.y+3);ctx.lineTo(g.x-2,g.y);ctx.closePath();ctx.fill();
}
function drawPowerup(pu,t){
  const col=pu.type==='rapid'?CYAN:(pu.type==='spread'?GOLD:MAG),L=pu.type==='rapid'?'R':(pu.type==='spread'?'S':'M');
  const yy=pu.y+Math.sin(t*4)*2;
  ctx.globalAlpha=0.3;fillCircleS(pu.x,yy,18,col);ctx.globalAlpha=1;
  ctx.fillStyle=col;fillCircle(pu.x,yy,12);
  ctx.fillStyle='#10121e';fillCircle(pu.x,yy,9.5);
  ctx.fillStyle=col;ctx.textAlign='center';ctx.font='800 12px "Bricolage Grotesque",system-ui,sans-serif';ctx.fillText(L,pu.x,yy+4.2);ctx.textAlign='left';
}
function render(t){
  const c=CITIES[cityIndex];
  ctx.fillStyle='#0c0818';ctx.fillRect(0,0,W,H);
  ctx.save();
  if(shake>0.5)ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
  drawBackground(c,t);
  if(state!=='menu'){hpwrap.classList.add('on');hpwrap.classList.toggle('mini',boss.mini);hpfill.style.transform='scaleX('+Math.max(0,boss.hp/boss.maxhp)+')';}else hpwrap.classList.remove('on');
  drawMasquerade(boss.x,boss.y<0?-60:boss.y,t,boss.mini);
  // dive telegraph crosshair
  if(boss.mode==='telegraph'||boss.mode==='dive'){
    const tx=boss.diveX,ty=H-118,bl=Math.floor(t*14)%2===0;
    ctx.strokeStyle=bl?'rgba(255,90,90,0.95)':'rgba(255,160,90,0.6)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(tx,ty,15,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(tx-21,ty);ctx.lineTo(tx-7,ty);ctx.moveTo(tx+7,ty);ctx.lineTo(tx+21,ty);ctx.moveTo(tx,ty-21);ctx.lineTo(tx,ty-7);ctx.moveTo(tx,ty+7);ctx.lineTo(tx,ty+21);ctx.stroke();
  }
  for(const g of gems)drawGem(g);
  for(const pu of powerups)drawPowerup(pu,t);
  for(const s of shots){
    if(s.kind==='bomb'){
      ctx.drawImage(sBombGlow,s.x-38,s.y-38);
      ctx.fillStyle="#1a0f20";fillCircle(s.x,s.y,s.r);
      const pulse=0.5+0.5*Math.sin(t*(s.fuse<0.6?34:13));
      ctx.fillStyle=MAG;fillCircle(s.x,s.y,s.r*0.45*pulse+2);
      ctx.fillStyle="#FCE0FF";fillCircle(s.x,s.y,2.4);
      ctx.fillStyle=GOLD;fillCircle(s.x,s.y-s.r-3,2+pulse*1.6);
    }else if(s.kind==='frag'){ctx.drawImage(sFrag,s.x-15,s.y-15);}
    else{ctx.drawImage(boss.mini?sOrbB:sOrb,s.x-24,s.y-24);}
  }
  for(const b of bullets)ctx.drawImage(sBolt,b.x-11,b.y-10);
  if(state==='playing'&&player.fireT>0.12){ctx.save();ctx.globalAlpha=clamp((player.fireT-0.12)/0.05,0,1);ctx.fillStyle=CYAN;fillCircle(player.x,player.y-22,8);ctx.fillStyle='#EAFFFF';fillCircle(player.x,player.y-22,3.5);ctx.restore();}
  drawHero(player.x,player.y,t);
  if(shieldT>0){
    const blink=shieldT<1.2&&Math.floor(t*10)%2===0;
    ctx.save();ctx.lineWidth=3;ctx.strokeStyle=blink?'rgba(244,194,75,0.9)':'rgba(92,225,230,'+(0.55+0.3*Math.sin(t*8))+')';
    ctx.beginPath();ctx.arc(player.x,player.y,30,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(92,225,230,0.08)';fillCircle(player.x,player.y,30);ctx.restore();
  }
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.color;fillCircle(p.x,p.y,p.r);}
  ctx.globalAlpha=1;
  if(pops.length){ctx.textAlign='center';ctx.font='800 18px "Bricolage Grotesque",system-ui,sans-serif';for(const p of pops){ctx.globalAlpha=clamp(p.life,0,1);ctx.fillStyle=p.color;ctx.fillText(p.text,p.x,p.y);}ctx.globalAlpha=1;ctx.textAlign='left';}
  ctx.restore();
  if(flash>0){ctx.fillStyle='rgba(190,240,255,'+Math.min(0.6,flash*0.6)+')';ctx.fillRect(0,0,W,H);}
  if(state==='playing'){let bx=14;const order=[['rapid',CYAN,'R'],['spread',GOLD,'S'],['magnet',MAG,'M']];for(const o of order){if(buffs[o[0]]>0){ctx.globalAlpha=0.25;fillCircleS(bx+8,40,9,o[1]);ctx.globalAlpha=1;fillCircleS(bx+8,40,7,o[1]);ctx.fillStyle='#10121e';ctx.textAlign='center';ctx.font='800 9px "Space Grotesk",sans-serif';ctx.fillText(o[2],bx+8,43);ctx.textAlign='left';bx+=22;}}}
}

function heartSVG(f){const d="M7 12.4C7 12.4 1 8.4 1 4.6 1 2.6 2.5 1.2 4.2 1.2 5.4 1.2 6.5 1.9 7 3 7.5 1.9 8.6 1.2 9.8 1.2 11.5 1.2 13 2.6 13 4.6 13 8.4 7 12.4 7 12.4Z";return f?'<svg width="17" height="16" viewBox="0 0 14 14"><path d="'+d+'" fill="'+RED+'"/></svg>':'<svg width="17" height="16" viewBox="0 0 14 14"><path d="'+d+'" fill="none" stroke="rgba(242,230,202,.35)" stroke-width="1.3"/></svg>';}
function updateHUD(){
  scoreText.textContent=score.toLocaleString();
  lvlText.textContent='Level '+level+' · '+CITIES[cityIndex].name;
  if(lives!==lastLives){lastLives=lives;let h='';for(let i=0;i<Math.max(3,lives);i++)h+=heartSVG(i<lives);livesEl.innerHTML=h;}
  if(state==='playing'){updateShieldBtn();updateBombBtn();updateExtraBtn();}
}
function short(a){return a.slice(0,4)+'…'+a.slice(-4);}
async function connectWallet(){
  const p=(window.phantom&&window.phantom.solana)||window.solana;
  if(!p||!p.isPhantom){toast('Open this game inside the Phantom app to connect your wallet.');return;}
  try{const r=await p.connect();wallet=r.publicKey.toString();updateWalletUI();toast('Wallet connected · '+short(wallet));}catch(e){}
}
function updateWalletUI(){
  if(wallet){chipText.textContent=short(wallet);connectBtn1.textContent='Connected · '+short(wallet);connectBtn1.classList.add('on');submitBtn.classList.remove('hidden');connectBtn2.classList.add('hidden');}
  else{chipText.textContent='utoñ · connect';connectBtn1.textContent='Connect wallet';connectBtn1.classList.remove('on');submitBtn.classList.add('hidden');connectBtn2.classList.remove('hidden');}
}
async function submitScore(){
  if(!wallet){toast('Connect your wallet first.');return;}
  try{
    const body=new URLSearchParams();body.append(CONFIG.FORM_WALLET,wallet);body.append(CONFIG.FORM_SCORE,String(score));
    await fetch(CONFIG.FORM_ACTION,{method:'POST',mode:'no-cors',body});
    submitted=true;submitBtn.textContent='Submitted ✓';submitBtn.disabled=true;toast('Score submitted ✓ — rewards are sent manually.');
  }catch(e){toast('Could not submit — check your connection and try again.');}
}

function setTarget(clientX){const rect=canvas.getBoundingClientRect();player.tx=clamp(clientX-rect.left,player.r,W-player.r);}
game.addEventListener('pointermove',e=>{if(state==='playing')setTarget(e.clientX);});
game.addEventListener('pointerdown',e=>{resumeAudio();if(state==='playing')setTarget(e.clientX);});
game.addEventListener('touchmove',e=>{if(state==='playing')e.preventDefault();},{passive:false});
playBtn.onclick=startGame;againBtn.onclick=startGame;
connectBtn1.onclick=connectWallet;connectBtn2.onclick=connectWallet;chip.onclick=connectWallet;
submitBtn.onclick=submitScore;extraBtn.onclick=useExtraLife;shieldBtn.onclick=activateShield;bombBtn.onclick=usePlayerBomb;
muteBtn.onclick=()=>{muted=!muted;muteBtn.textContent=muted?'♪̸':'♪';muteBtn.style.color=muted?'rgba(242,230,202,.3)':'';if(!muted)resumeAudio();};
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,200));

/* ---------- boot ---------- */
function frame(now){const dt=Math.min(0.033,(now-(last||now))/1000);last=now;if(state==='playing')update(dt);render(now/1000);updateHUD();requestAnimationFrame(frame);}
let booted=false;
function boot(){if(booted)return;booted=true;resize();player.x=W/2;player.tx=W/2;boss.x=W/2;boss.y=boss.ty;boss.hp=boss.maxhp=16;updateWalletUI();requestAnimationFrame(frame);}
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(boot);
setTimeout(boot,500);
</script>
</body>
</html>
